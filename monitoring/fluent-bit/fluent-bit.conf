[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224
    Tag          docker.*

[FILTER]
    Name         modify
    Match        docker.*
    Rename       log message

[OUTPUT]
    Name         pgsql
    Match        docker.*
    Host         postgres-db
    Port         5432
    User         labuser
    Password     labpass123
    Database     labdb
    Table        container_logs
    Schema       logs
    Timestamp_Key timestamp
    Async        false
    min_pool_size 1
    max_pool_size 4

[OUTPUT]
    Name         stdout
    Match        docker.*
    Format       json_lines
